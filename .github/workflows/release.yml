name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            asset: herdr-layout-windows-x64.exe
          - os: macos-latest
            target: darwin-x64
            asset: herdr-layout-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            asset: herdr-layout-darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
            asset: herdr-layout-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            asset: herdr-layout-linux-arm64
          - os: ubuntu-latest
            target: linux-musl-x64
            asset: herdr-layout-linux-musl-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run build:release -- ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: semantic release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: npx --no-install semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
