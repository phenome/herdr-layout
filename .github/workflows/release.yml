name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            rustTarget: x86_64-pc-windows-msvc
            asset: herdr-layout-windows-x64.exe
            aptPackages: ""
          - os: macos-latest
            target: darwin-x64
            rustTarget: x86_64-apple-darwin
            asset: herdr-layout-darwin-x64
            aptPackages: ""
          - os: macos-latest
            target: darwin-arm64
            rustTarget: aarch64-apple-darwin
            asset: herdr-layout-darwin-arm64
            aptPackages: ""
          - os: ubuntu-latest
            target: linux-x64
            rustTarget: x86_64-unknown-linux-gnu
            asset: herdr-layout-linux-x64
            aptPackages: ""
          - os: ubuntu-latest
            target: linux-arm64
            rustTarget: aarch64-unknown-linux-gnu
            asset: herdr-layout-linux-arm64
            aptPackages: "gcc-aarch64-linux-gnu"
          - os: ubuntu-latest
            target: linux-musl-x64
            rustTarget: x86_64-unknown-linux-musl
            asset: herdr-layout-linux-musl-x64
            aptPackages: "musl-tools"

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - if: runner.os == 'Linux' && matrix.aptPackages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.aptPackages }}

      - run: cargo test --locked
      - run: cargo check --all-targets --locked
      - run: cargo build --release --locked --target ${{ matrix.rustTarget }}

      - shell: bash
        run: |
          mkdir -p dist
          bin="target/${{ matrix.rustTarget }}/release/herdr-layout"
          if [ "${{ runner.os }}" = "Windows" ]; then bin="$bin.exe"; fi
          cp "$bin" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: semantic release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - run: npx --no-install semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
