name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            asset: herdr-layout-windows-x64.exe
          - os: macos-latest
            target: darwin-x64
            asset: herdr-layout-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            asset: herdr-layout-darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
            asset: herdr-layout-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            asset: herdr-layout-linux-arm64
          - os: ubuntu-latest
            target: linux-musl-x64
            asset: herdr-layout-linux-musl-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run build:release -- ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
